<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bürgermeisterwahl Blaubeuren 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blau:  #013A50;
  --gelb:  #FFDD00;
  --bg:    #F2F6FA;
  --white: #FFFFFF;
  --div:   #C8D8E8;
  --text:  #0D1A26;
  --muted: #5A7090;
  --font:  Arial, Helvetica, sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}

/* ══ ROOT: Linke Leiste + Rechte Seite ══ */
.root{display:grid;grid-template-columns:310px 1fr;height:100vh}

/* ══ LINKE LEISTE ══ */
.left{background:var(--blau);display:flex;flex-direction:column;overflow:hidden}

.left-logo{background:#fff;padding:13px 18px 11px;border-bottom:3px solid var(--blau);flex-shrink:0}
.logo-img{width:180px;display:block}
.wahl-label{font-size:10px;color:var(--muted);margin-top:6px}

/* Bezirk-Grid 3×6 – nimmt verfügbaren Platz */
.bk-section{overflow:hidden;padding:10px 14px 8px;display:flex;flex-direction:column}
.bk-section-label{font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:9px;flex-shrink:0}
.bk-grid-3col{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;flex:1;align-content:start}
.bk-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);padding:8px 9px;display:flex;flex-direction:column;gap:3px;transition:background .5s,border-color .5s}
.bk-card.done{background:rgba(255,221,0,.1);border-color:rgba(255,221,0,.35)}
.bk-card-top{display:flex;align-items:center;gap:7px}
.bk-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.25);transition:all .5s}
.bk-card.done .bk-dot{background:var(--gelb);border-color:var(--gelb)}
.bk-nr{font-size:12px;font-weight:700;font-family:monospace;color:rgba(255,255,255,.45);line-height:1}
.bk-card.done .bk-nr{color:#fff}
.bk-ort{font-size:11px;color:rgba(255,255,255,.35);line-height:1.2}
.bk-card.done .bk-ort{color:rgba(255,255,255,.8)}
.bk-time{font-size:10px;font-family:monospace;color:var(--gelb);margin-top:1px}

/* Stats-Block links unten */
.left-stats{padding:0 14px 10px;flex-shrink:0}
.left-stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.lst{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);padding:6px 10px}
.lstl{font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:2px}
.lstv{font-size:15px;font-weight:700;font-family:monospace;color:#fff;line-height:1}
.lstv.gelb{color:var(--gelb)}
.left-prog{padding:0 14px 10px;flex-shrink:0}
.prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.prog-txt{font-size:7px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35)}
.prog-num{font-size:11px;font-weight:700;font-family:monospace;color:rgba(255,255,255,.7)}
.prog-track{height:3px;background:rgba(255,255,255,.12);overflow:hidden}
.prog-fill{height:100%;background:rgba(255,255,255,.55);transition:width 1s ease}border-top:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.15);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.upd{font-size:9px;font-family:monospace;color:rgba(255,255,255,.28)}
.pulse{width:7px;height:7px;border-radius:50%;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.4)}50%{box-shadow:0 0 0 5px rgba(255,255,255,0)}}
.status-chip{font-size:8px;font-family:monospace;padding:2px 7px;letter-spacing:1px;text-transform:uppercase}
.status-chip.live{background:#d0efe0;color:#005030;border:1px solid #408060}
.status-chip.wait{background:#fffad0;color:#605000;border:1px solid #a09000}
.status-chip.err{background:#fde8e8;color:#C03030;border:1px solid #C03030}

/* ══ RECHTE SEITE ══ */
.right{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── Gesamtergebnis-Block (permanent oben) ── */
.gesamt-panel{background:var(--white);border-bottom:2px solid var(--blau);padding:14px 24px 12px;flex-shrink:0}
.gesamt-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.gesamt-title{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.gesamt-sub{font-size:11px;font-family:monospace;color:var(--muted)}
.gesamt-cands{display:flex;flex-direction:column;gap:7px}
.g-row{display:flex;align-items:center;gap:10px}
.g-rank{font-size:12px;font-weight:700;font-family:monospace;color:var(--muted);width:16px;text-align:center;flex-shrink:0}
.g-name{font-size:clamp(13px,1.4vw,17px);font-weight:700;width:175px;flex-shrink:0;line-height:1.2;white-space:normal;word-break:break-word}
.g-name .vn{font-weight:400;color:var(--muted);font-size:.88em}
.g-stw{display:inline-block;font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;background:var(--gelb);color:#000;margin-left:4px;vertical-align:middle}
.g-win{display:inline-block;font-size:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;background:#2E7A4A;color:#fff;margin-left:4px;vertical-align:middle}
.g-track{flex:1;background:var(--bg);overflow:hidden;position:relative;height:34px}
.g-fill{position:absolute;left:0;top:0;height:100%;width:0;display:flex;align-items:center;padding:0 10px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.g-pct-in{font-size:13px;font-weight:700;font-family:monospace;color:#fff;white-space:nowrap;opacity:0;transition:opacity .3s ease 1s}
.g-pct-in.vis{opacity:1}
.g-pct-out{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:700;font-family:monospace;color:var(--blau);white-space:nowrap;opacity:0;transition:opacity .3s ease 1s}
.g-pct-out.vis{opacity:1}
.g-stim{font-size:11px;font-family:monospace;color:var(--muted);min-width:70px;text-align:right;flex-shrink:0}
.fill-c0{background:var(--blau)}
.fill-c1{background:#1A5E7A}
.fill-c2{background:#2E7A9A}
.fill-c3{background:#4A9AB8}

/* ── Slide-Bereich (unten, rollt durch Bezirke) ── */
.slides-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.slides-wrap{flex:1;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;transform:translateY(8px);transition:opacity .55s ease,transform .55s ease;pointer-events:none;overflow:hidden}
.slide.active{opacity:1;transform:translateY(0);pointer-events:all}
.slide.exit{opacity:0;transform:translateY(-8px)}

/* Typ-Kopfleiste mit Bezirk-Nummer + Name + Uhrzeit */
.type-bar{background:var(--blau);padding:10px 22px;display:flex;align-items:center;gap:0;flex-shrink:0}
.type-badge{background:rgba(255,255,255,.18);padding:5px 12px;flex-shrink:0;display:flex;flex-direction:column;gap:1px;margin-right:16px}
.type-eyebrow{font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.55)}
.type-nr{font-size:20px;font-weight:700;color:#fff;line-height:1;letter-spacing:-.5px}
.type-fullname{font-size:14px;font-weight:700;color:#fff;line-height:1.25;flex:1}
.type-time{margin-left:auto;text-align:right;flex-shrink:0;padding-left:16px}
.type-time-label{font-size:8px;color:rgba(255,255,255,.45);letter-spacing:1px}
.type-time-val{font-size:14px;font-weight:700;font-family:monospace;color:#fff;line-height:1;margin-top:1px}

/* Slide-Body */
.slide-body{flex:1;padding:12px 22px 10px;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

/* Bezirk-Stats */
.bz-stats{display:flex;gap:8px;margin-bottom:10px;flex-shrink:0}
.bz-stat{background:var(--white);border-left:3px solid var(--blau);padding:6px 12px}
.bz-stat-l{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.bz-stat-v{font-size:17px;font-weight:700;font-family:monospace;color:var(--text);line-height:1}
.bz-stat-v.blau{color:var(--blau)}

/* Kandidaten */
.cands{display:flex;flex-direction:column;gap:7px}
.cand-row{display:flex;align-items:center;gap:9px}
.cand-rank{font-size:12px;font-weight:700;font-family:monospace;color:var(--muted);width:16px;flex-shrink:0;text-align:center}
.cand-name{
  font-size:clamp(13px,1.4vw,17px);font-weight:700;
  line-height:1.2;width:175px;flex-shrink:0;
  white-space:normal;word-break:break-word;color:var(--text);
}
.cand-name .vn{font-weight:400;color:var(--muted);font-size:.85em}
/* Balken-Track + Position für Prozent */
.cand-track{flex:1;overflow:hidden;background:var(--white);border:1px solid var(--div);position:relative;height:46px}
.cand-fill{position:absolute;left:0;top:0;height:100%;width:0;display:flex;align-items:center;padding:0 12px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
/* Prozent innen (wenn Balken breit genug) */
.cand-pct-in{font-size:clamp(12px,1.5vw,16px);font-weight:700;font-family:monospace;color:#fff;white-space:nowrap;opacity:0;transition:opacity .3s ease .9s}
.cand-pct-in.vis{opacity:1}
/* Prozent außen (als Fallback für schmale Balken) */
.cand-pct-out{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:clamp(12px,1.5vw,16px);font-weight:700;font-family:monospace;color:var(--blau);white-space:nowrap;opacity:0;transition:opacity .3s ease .9s;pointer-events:none}
.cand-pct-out.vis{opacity:1}

.cand-stimmen{font-size:clamp(10px,1.1vw,12px);font-family:monospace;color:var(--muted);min-width:65px;text-align:right;flex-shrink:0}

/* Vergleich */
.cmp{margin-top:8px}
.cmp-title{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.cmp-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.cmp-name{font-size:11px;font-weight:700;width:125px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
.cmp-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.cmp-bar{height:7px;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.cmp-bar.loc.c0{background:var(--blau)}.cmp-bar.loc.c1{background:#1A5E7A}.cmp-bar.loc.c2{background:#2E7A9A}.cmp-bar.loc.c3{background:#4A9AB8}
.cmp-bar.glob{background:var(--div)}
.cmp-pcts{font-size:10px;font-family:monospace;min-width:82px;text-align:right;color:var(--muted)}

.warte{flex:1;display:flex;align-items:center;justify-content:center}
.warte-text{font-size:16px;font-weight:700;color:var(--muted)}

/* Footer */
.slide-foot{flex-shrink:0;padding:6px 22px 9px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--div);background:var(--white)}
.nav-dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;max-width:60%}
.nd{width:7px;height:7px;border-radius:50%;background:var(--div);transition:background .3s,width .3s;flex-shrink:0}
.nd.active{background:var(--blau);width:18px;border-radius:0}
.nd.isnew{background:var(--gelb)}
.foot-r{display:flex;align-items:center;gap:9px}
.foot-txt{font-size:10px;font-family:monospace;color:var(--muted)}
.t-wrap{width:24px;height:24px}.t-wrap svg{transform:rotate(-90deg)}
.t-bg{stroke:var(--div);stroke-width:2.5;fill:none}
.t-arc{stroke:var(--blau);stroke-width:2.5;fill:none;stroke-linecap:square;transition:stroke-dashoffset .1s linear}

/* NEU-Banner */
.neu{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--gelb);color:#000;font-size:18px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:11px 24px;display:flex;align-items:center;justify-content:center;gap:14px;transform:translateY(-100%);transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none}
.neu.show{transform:translateY(0)}
.neu-dot{width:10px;height:10px;border-radius:50%;background:#000;animation:blink .8s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

@media(max-width:900px){.root{grid-template-columns:1fr}.left{display:none}}
</style>
</head>

<script>
const SLIDE_SEC=12, REFRESH_SEC=20, DATA_URL='./daten.json';
const G={candidates:[],stichwahl:[],gewinner:null,beteiligung:'—',waehler:0,berechtigt:0,ungueltig:0,ausgezaehlt:0,gesamt:18,updateTime:null,datum:'2026',bezirke:[]};
let knownCounted=new Set();

function fixName(name){
  if(name==='Wähler benannte Personen'||name==='Wähler ben. Personen') return 'Vom Wähler benannte Personen';
  return name;
}
function fixVorname(name, vorname){
  if(name==='Mikat'&&vorname&&vorname.includes('Mirijam')&&!vorname.includes('Yasmin'))
    return vorname+' Yasmin';
  return vorname;
}

async function loadData(){
  const chip=document.getElementById('status-chip');
  try{
    const r=await fetch(DATA_URL+'?t='+Date.now(),{cache:'no-store',headers:{'Pragma':'no-cache','Cache-Control':'no-cache'}});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    chip.className='status-chip live'; chip.textContent='Live';
    if(d.datum) G.datum=d.datum;
    if(d.ausgezaehlt!==undefined) G.ausgezaehlt=d.ausgezaehlt;
    if(d.gesamt!==undefined)      G.gesamt=d.gesamt;
    if(d.globalStats){
      G.beteiligung=d.globalStats.beteiligung||'—';
      G.waehler=d.globalStats.waehler||0;
      G.berechtigt=d.globalStats.berechtigt||0;
      G.ungueltig=d.globalStats.ungueltig||0;
    }
    if(d.globalCandidates&&d.globalCandidates.length){
      G.candidates=d.globalCandidates.map(c=>({...c,name:fixName(c.name),vorname:fixVorname(c.name,c.vorname)}));
      // Stichwahl nur wenn KEIN Kandidat absolute Mehrheit (>50%) hat
      const hatMehrheit = G.candidates.some(c => c.anteil > 50);
      G.stichwahl = hatMehrheit ? [] : G.candidates.slice(0,2).map(c=>c.name);
      G.gewinner  = hatMehrheit ? G.candidates[0].name : null;
    }
    if(d.bezirke) G.bezirke=d.bezirke.map(b=>{
      if(b.candidates) b.candidates=b.candidates.map(c=>({...c,name:fixName(c.name),vorname:fixVorname(c.name,c.vorname)}));
      return b;
    });
    G.updateTime=new Date(d.fetchedAt||Date.now());

    /* Neu ausgezählte Bezirke: counted Flag ODER candidates vorhanden */
    const newlyDone=G.bezirke.filter(b=>(b.counted||(b.candidates&&b.candidates.length>0))&&!knownCounted.has(b.url));

    renderLeft();
    renderGesamt();
    if(newlyDone.length>0){
      newlyDone.forEach(b=>knownCounted.add(b.url));
      onNewData(newlyDone);
    }
    document.getElementById('pulse').style.background='rgba(255,255,255,.6)';
    // Browser-seitige Prüfzeit – aktualisiert bei jedem fetch
    const chk=document.getElementById('l-upd-check');
    if(chk) chk.textContent='Geprüft: '+new Date().toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){
    console.warn('Ladefehler:',e.message);
    chip.className='status-chip err'; chip.textContent='Fehler';
    const chk=document.getElementById('l-upd-check');
    if(chk) chk.textContent='Geprüft: '+new Date().toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
}

/* ── Gesamtergebnis (permanent) ── */
function renderGesamt(){
  document.getElementById('g-ausz').innerHTML=
    G.ausgezaehlt+' / '+G.gesamt+' Gebieten &nbsp;·&nbsp; Beteiligung <span id="g-bet">'+G.beteiligung+'</span>';
  const cont=document.getElementById('gesamt-cands');
  if(!G.candidates.length){
    cont.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 0">Warte auf erste Ergebnisse …</div>';
    return;
  }
  const max=Math.max(...G.candidates.map(c=>c.anteil),1);
  cont.innerHTML=G.candidates.map((c,i)=>{
    const pct=(c.anteil/max*100).toFixed(1);
    /* Schwellwert: < 22% → Prozent außen anzeigen */
    const narrow=parseFloat(pct)<22;
    return '<div class="g-row">'
      +'<div class="g-rank">'+(i+1)+'</div>'
      +'<div class="g-name">'+c.name
      +(G.gewinner===c.name?'<span class="g-win">Gewählt</span>'
        :G.stichwahl.includes(c.name)?'<span class="g-stw">Stichw.</span>':'')
      +(c.vorname?'<br><span class="vn">'+c.vorname+'</span>':'')+'</div>'
      +'<div class="g-track">'
        +'<div class="g-fill fill-c'+i+'" data-pct="'+pct+'">'
          +'<span class="g-pct-in'+(narrow?'':'')+'">'+(narrow?'':c.anteil.toFixed(1).replace('.',',')+' %')+'</span>'
        +'</div>'
        +(narrow?'<span class="g-pct-out" data-pctout="'+pct+'">'+c.anteil.toFixed(1).replace('.',',')+' %</span>':'')
      +'</div>'
      +'<div class="g-stim">'+c.stimmen.toLocaleString('de')+' St.</div>'
    +'</div>';
  }).join('');
  setTimeout(()=>animateGesamt(),100);
}

function animateGesamt(){
  document.querySelectorAll('#gesamt-cands .g-fill[data-pct]').forEach(b=>{
    b.style.width=b.dataset.pct+'%';
    const pi=b.querySelector('.g-pct-in');
    if(pi&&pi.textContent) pi.classList.add('vis');
  });
  document.querySelectorAll('#gesamt-cands .g-pct-out[data-pctout]').forEach(el=>{
    setTimeout(()=>el.classList.add('vis'),900);
  });
}

/* ── Linke Leiste ── */
function renderLeft(){
  document.getElementById('l-datum').textContent=G.datum||'2026';
  // Uhrzeit aus daten.json (wann Python zuletzt abgerufen hat)
  const datenEl=document.getElementById('l-upd-daten');
  if(datenEl&&G.updateTime) datenEl.textContent='Daten: '+G.updateTime.toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  // Stats
  const bet=document.getElementById('l-bet'); if(bet) bet.textContent=G.beteiligung;
  const wae=document.getElementById('l-wae'); if(wae) wae.textContent=G.waehler?G.waehler.toLocaleString('de'):'—';
  const ber=document.getElementById('l-ber'); if(ber) ber.textContent=G.berechtigt?G.berechtigt.toLocaleString('de'):'—';
  const ung=document.getElementById('l-ung'); if(ung) ung.textContent=G.ungueltig!==undefined?G.ungueltig.toLocaleString('de'):'—';
  const at=document.getElementById('l-ausz-txt'); if(at) at.textContent=G.ausgezaehlt+' / '+G.gesamt;
  const ab=document.getElementById('l-ausz-bar'); if(ab) ab.style.width=(G.gesamt>0?G.ausgezaehlt/G.gesamt*100:0).toFixed(1)+'%';

  const cont=document.getElementById('bezirk-grid');
  if(!G.bezirke.length){
    cont.innerHTML=Array.from({length:18},(_,i)=>'<div class="bk-card"><div class="bk-card-top"><div class="bk-dot"></div><div class="bk-nr">—</div></div></div>').join('');
    return;
  }
  cont.innerHTML=G.bezirke.map(b=>{
    /* counted: Flag oder candidates vorhanden */
    const done=b.counted||(b.candidates&&b.candidates.length>0);
    const ort=b.ort||b.nr;
    return '<div class="bk-card'+(done?' done':'')+'" title="'+b.name+'">'
      +'<div class="bk-card-top"><div class="bk-dot"></div><div class="bk-nr">'+b.nr+'</div></div>'
      +'<div class="bk-ort">'+ort+'</div>'
      +(done&&b.time?'<div class="bk-time">'+b.time+' Uhr</div>'
        :done?'<div class="bk-time" style="color:rgba(255,255,255,.4);font-style:italic">keine Zeit</div>':'')
      +'</div>';
  }).join('');
}

/* ── Slides Engine ── */
let slides=[],currentIdx=0,timerStart=Date.now(),slideTimer=null;
const SLIDE_MS=SLIDE_SEC*1000;

function initSlides(){
  document.getElementById('slides-wrap').innerHTML='';
  slides=[];
  const el=document.createElement('div');
  el.className='slide';
  el.innerHTML='<div class="slide-body"><div class="warte"><div class="warte-text">Warte auf erste Bezirksergebnisse …</div></div></div>';
  document.getElementById('slides-wrap').appendChild(el);
  slides.push({el,type:'warten',bk:null,isNew:false});
  activateSlide(0,true);
  rebuildNav();
  startAutoAdvance();
}

function addSlide(bk){
  const el=document.createElement('div');
  el.className='slide';
  el.innerHTML=htmlBezirk(bk);
  document.getElementById('slides-wrap').appendChild(el);
  return{el,type:'bezirk',bk,isNew:false};
}

function onNewData(nb){
  if(slides.length===1&&slides[0].type==='warten'){slides[0].el.remove();slides=[];currentIdx=0;}
  const added=[];
  nb.filter(bk=>bk.candidates&&bk.candidates.length>0).forEach(bk=>{
    const ex=slides.find(s=>s.bk&&s.bk.url===bk.url);
    if(!ex){const s=addSlide(bk);s.isNew=true;slides.push(s);added.push(s);}
    else{ex.el.innerHTML=htmlBezirk(bk);ex.isNew=false;}
  });
  rebuildNav();
  if(added.length>0){
    showNeuBanner(nb);
    clearTimeout(slideTimer);
    slideTimer=setTimeout(()=>{goToSlide(slides.indexOf(added[0]));startAutoAdvance();},Math.min(SLIDE_MS-(Date.now()-timerStart),3000));
  }
}

function startAutoAdvance(){clearTimeout(slideTimer);slideTimer=setTimeout(()=>{goToSlide((currentIdx+1)%slides.length);startAutoAdvance();},SLIDE_MS);}

function goToSlide(idx){
  if(idx===currentIdx||!slides[idx])return;
  slides[currentIdx].el.classList.add('exit');slides[currentIdx].el.classList.remove('active');
  setTimeout(()=>slides[currentIdx]&&slides[currentIdx].el.classList.remove('exit'),700);
  slides[idx].el.classList.add('active');slides[idx].isNew=false;
  currentIdx=idx;timerStart=Date.now();rebuildNav();updateFootTxt();
  setTimeout(()=>animateBars(slides[idx].el),200);
}
function activateSlide(idx,instant){
  slides.forEach((s,i)=>s.el.classList.toggle('active',i===idx));
  currentIdx=idx;timerStart=Date.now();rebuildNav();updateFootTxt();
  setTimeout(()=>animateBars(slides[idx].el),instant?50:200);
}
function rebuildNav(){
  document.getElementById('nav-dots').innerHTML=slides.map((s,i)=>{
    let c='nd';if(i===currentIdx)c+=' active';else if(s.isNew)c+=' isnew';
    return'<div class="'+c+'" title="'+(s.bk?s.bk.name:'')+'" ></div>';
  }).join('');
  updateFootTxt();
}
function updateFootTxt(){
  const s=slides[currentIdx];
  document.getElementById('foot-txt').textContent=s&&s.bk
    ?'Bezirk '+s.bk.nr+' · '+(currentIdx+1)+' / '+slides.length
    :'— / '+slides.length;
}
function animateBars(el){
  el.querySelectorAll('.cand-fill[data-pct]').forEach(b=>{
    const pct=parseFloat(b.dataset.pct);
    b.style.width=b.dataset.pct+'%';
    const narrow=pct<22;
    /* Schrift innen sichtbar machen wenn Balken breit */
    const pi=b.querySelector('.cand-pct-in');
    if(pi&&!narrow) setTimeout(()=>pi.classList.add('vis'),900);
  });
  /* Schrift außen */
  el.querySelectorAll('.cand-pct-out').forEach(el2=>{
    setTimeout(()=>el2.classList.add('vis'),900);
  });
  el.querySelectorAll('.cmp-bar[data-cmp]').forEach(b=>b.style.width=b.dataset.cmp+'%');
}

/* ── Bezirk HTML ── */
function htmlBezirk(bk){
  if(!bk.candidates||!bk.candidates.length)
    return '<div class="slide-body"><div class="warte"><div class="warte-text">Keine Daten</div></div></div>';

  const max=Math.max(...bk.candidates.map(c=>c.anteil),1);
  const gMax=G.candidates.length?Math.max(...G.candidates.map(c=>c.anteil),1):1;

  /* Typ-Kopfleiste: Badge mit Nr + vollständiger Bezirk-Name + Uhrzeit in einer Zeile */
  const bar='<div class="type-bar">'
    +'<div class="type-badge"><div class="type-eyebrow">Wahlbezirk</div><div class="type-nr">'+bk.nr+'</div></div>'
    +'<div class="type-fullname">'+bk.name+'</div>'
    +(bk.time
      ?'<div class="type-time"><div class="type-time-label">Ergebnis eingegangen um</div><div class="type-time-val">'+bk.time+' Uhr</div></div>'
      :bk.candidates&&bk.candidates.length?'<div class="type-time"><div class="type-time-label">Ergebnis eingegangen</div><div class="type-time-val" style="font-size:11px;opacity:.6">Zeit unbekannt</div></div>'
      :'')
    +'</div>';

  /* Stats */
  const stats='<div class="bz-stats">'
    +'<div class="bz-stat"><div class="bz-stat-l">Beteiligung</div><div class="bz-stat-v blau">'+bk.beteiligung+'</div></div>'
    +'<div class="bz-stat"><div class="bz-stat-l">Wählende</div><div class="bz-stat-v">'+(bk.waehler||0).toLocaleString('de')+'</div></div>'
    +'<div class="bz-stat"><div class="bz-stat-l">Berechtigt</div><div class="bz-stat-v">'+(bk.berechtigt||0).toLocaleString('de')+'</div></div>'
    +'</div>';

  /* Kandidaten mit Prozent-Logik */
  const cands='<div class="cands">'+bk.candidates.map((c,i)=>{
    const pct=(c.anteil/max*100).toFixed(1);
    const narrow=parseFloat(pct)<22;
    return '<div class="cand-row">'
      +'<div class="cand-rank">'+(i+1)+'</div>'
      +'<div class="cand-name">'+c.name+(c.vorname?'<br><span class="vn">'+c.vorname+'</span>':'')+'</div>'
      +'<div class="cand-track">'
        +'<div class="cand-fill fill-c'+i+'" data-pct="'+pct+'">'
          +'<span class="cand-pct-in">'+(narrow?'':c.anteil.toFixed(1).replace('.',',')+' %')+'</span>'
        +'</div>'
        +(narrow?'<span class="cand-pct-out">'+c.anteil.toFixed(1).replace('.',',')+' %</span>':'')
      +'</div>'
      +'<div class="cand-stimmen">'+(c.stimmen||0).toLocaleString('de')+' St.</div>'
    +'</div>';
  }).join('')+'</div>';

  /* Vergleich */
  let cmp='';
  if(G.ausgezaehlt>1){
    const rows=bk.candidates.map((c,i)=>{
      const gc=G.candidates.find(g=>g.name===c.name);
      const diff=gc?(c.anteil-gc.anteil):null;
      const ds=diff!==null?(diff>=0?'+':'')+diff.toFixed(1).replace('.',',')+' %':'';
      const dc=diff!==null&&diff>=0?'#006F74':'#C03030';
      return '<div class="cmp-row">'
        +'<div class="cmp-name">'+c.name+'</div>'
        +'<div class="cmp-bars"><div class="cmp-bar loc c'+i+'" data-cmp="'+(c.anteil/max*100).toFixed(1)+'"></div>'
        +(gc?'<div class="cmp-bar glob" data-cmp="'+(gc.anteil/gMax*100).toFixed(1)+'"></div>':'')+'</div>'
        +'<div class="cmp-pcts">'+c.anteil.toFixed(1).replace('.',',')+' % <span style="color:'+dc+'">'+ds+'</span></div>'
        +'</div>';
    }).join('');
    cmp='<div class="cmp"><div class="cmp-title">Vergleich mit Gesamtergebnis <span style="opacity:.4">(oben=Bezirk · unten=Gesamt)</span></div>'+rows+'</div>';
  }

  return bar+'<div class="slide-body">'+stats+cands+cmp+'</div>';
}

/* ── NEU-Banner ── */
let bannerT=null;
function showNeuBanner(bz){
  const b=document.getElementById('neu-banner');
  document.getElementById('neu-text').textContent=bz.length===1?'Neues Ergebnis: '+bz[0].ort:bz.length+' neue Ergebnisse';
  b.classList.add('show');clearTimeout(bannerT);bannerT=setTimeout(()=>b.classList.remove('show'),5000);
}

/* ── Timer Ring ── */
const arc=document.getElementById('t-arc');
setInterval(()=>{
  const p=Math.min((Date.now()-timerStart)/SLIDE_MS,1);
  if(arc) arc.setAttribute('stroke-dashoffset',(56.5*(1-p)).toFixed(2));
},100);

/* ── Start ── */
initSlides();
loadData();
setInterval(loadData,REFRESH_SEC*1000);
</script>

</html>
