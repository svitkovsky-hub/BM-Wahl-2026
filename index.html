<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bürgermeisterwahl Blaubeuren</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800;900&family=Barlow:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0C10;--bg2:#10131A;--bg3:#181C26;--bg4:#1F2433;
  --div:rgba(255,255,255,.07);--text:#EEF0F7;--muted:#6B7590;--dim:#3A4260;
  --amber:#F5A623;--amber2:#7A5010;
  --blue:#4BA8F0;--blue2:#1A3F6F;
  --teal:#2ECFA0;--teal2:#0C5240;
  --slate:#8899BB;--slate2:#2A3450;
  --T:.6s;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden}

/* ── Layout ── */
.root{display:grid;grid-template-columns:340px 1fr;height:100vh}

/* ── Left ── */
.left{background:var(--bg2);border-right:1px solid var(--div);display:flex;flex-direction:column;padding:26px 24px 18px;overflow:hidden}
.logo-row{display:flex;align-items:center;gap:9px;margin-bottom:18px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);flex-shrink:0}
.logo-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--amber)}
.left-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(20px,2vw,28px);font-weight:900;line-height:1;letter-spacing:-.5px;margin-bottom:3px}
.left-sub{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:300;color:var(--muted);margin-bottom:18px}
.ldiv{height:1px;background:var(--div);margin:0 -24px;margin-bottom:14px}
.lh{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.mini-cand{margin-bottom:13px}
.mini-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.mini-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700}
.mini-sub{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:300;color:var(--muted)}
.mini-pct{font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
.mini-pct.c0{color:var(--amber)}.mini-pct.c1{color:var(--blue)}.mini-pct.c2{color:var(--teal)}.mini-pct.c3{color:var(--slate)}
.mini-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.mini-fill{height:100%;border-radius:3px;width:0;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.mini-fill.c0{background:var(--amber)}.mini-fill.c1{background:var(--blue)}.mini-fill.c2{background:var(--teal)}.mini-fill.c3{background:var(--slate)}
.mini-st{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px}
.stw-tag{display:inline-block;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:1px 5px;border-radius:2px;background:var(--amber);color:#000;margin-left:5px;vertical-align:middle}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:2px}
.stat-tile{background:var(--bg3);border-radius:5px;padding:9px 11px}
.stl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.stv{font-family:'Space Mono',monospace;font-size:17px;font-weight:700;line-height:1}
.stv.amber{color:var(--amber)}
.prog{margin-top:13px}
.prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.prog-track{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--amber);border-radius:2px;transition:width 1s ease}
.left-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--div);display:flex;align-items:center;justify-content:space-between}
.upd{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.pulse{width:7px;height:7px;border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(46,207,160,.5)}50%{box-shadow:0 0 0 4px rgba(46,207,160,0)}}

/* ── Right / Slides ── */
.right{display:flex;flex-direction:column;overflow:hidden}
.slides-wrap{flex:1;position:relative;overflow:hidden}
.slide{position:absolute;inset:0;padding:26px 34px 20px;opacity:0;transform:translateX(40px);transition:opacity var(--T) ease,transform var(--T) ease;pointer-events:none;overflow:hidden}
.slide.active{opacity:1;transform:translateX(0);pointer-events:all}
.slide.exit{opacity:0;transform:translateX(-40px)}
.slide-lbl{font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.slide-lbl::after{content:'';flex:1;height:1px;background:var(--div)}

/* Gesamt-Slide */
.g-cand{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.g-rank{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);width:16px;flex-shrink:0}
.g-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(17px,2.3vw,30px);font-weight:800;line-height:1;min-width:185px;flex-shrink:0}
.g-name .vn{font-weight:300;color:var(--muted)}
.g-track{flex:1;height:50px;background:var(--bg3);border-radius:5px;overflow:hidden}
.g-fill{height:100%;border-radius:5px;width:0;display:flex;align-items:center;padding:0 13px;transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.g-fill.c0{background:linear-gradient(90deg,var(--amber2),var(--amber))}.g-fill.c1{background:linear-gradient(90deg,var(--blue2),var(--blue))}
.g-fill.c2{background:linear-gradient(90deg,var(--teal2),var(--teal))}.g-fill.c3{background:linear-gradient(90deg,var(--slate2),var(--slate))}
.g-pct{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:rgba(0,0,0,.8);white-space:nowrap;opacity:0;transition:opacity .4s ease .9s}
.g-pct.vis{opacity:1}
.g-stim{font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);min-width:85px;text-align:right;flex-shrink:0}

/* Auszählung-Slide */
.bk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:7px;align-content:start;max-height:calc(100vh - 160px);overflow:hidden}
.bk-card{background:var(--bg2);border:1px solid var(--div);border-radius:6px;padding:9px 12px;display:flex;align-items:flex-start;gap:9px;transition:border-color .6s,background .6s}
.bk-card.done{background:rgba(245,166,35,.06);border-color:rgba(245,166,35,.3)}
.bk-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;background:var(--bg4);border:1.5px solid var(--dim);transition:all .6s}
.bk-card.done .bk-dot{background:var(--amber);border-color:var(--amber);box-shadow:0 0 6px rgba(245,166,35,.5)}
.bk-name{font-size:11px;font-weight:500;line-height:1.3}
.bk-card:not(.done) .bk-name{color:var(--muted)}
.bk-time{font-family:'Space Mono',monospace;font-size:10px;color:var(--amber);margin-top:1px}

/* Bezirk-Slide */
.bz-ort{font-family:'Barlow Condensed',sans-serif;font-size:clamp(20px,2.6vw,36px);font-weight:800;line-height:1;margin-bottom:2px}
.bz-addr{font-size:12px;color:var(--muted);margin-bottom:16px}
.bz-stats{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.bs{background:var(--bg3);border-radius:5px;padding:8px 13px}
.bsl{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.bsv{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;line-height:1}
.bsv.amber{color:var(--amber)}
.bz-cands{display:flex;flex-direction:column;gap:11px}
.bz-row{display:flex;align-items:center;gap:12px}
.bz-name{font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,1.7vw,22px);font-weight:700;min-width:165px;flex-shrink:0;line-height:1.1}
.bz-name .vn{font-weight:300;color:var(--muted)}
.bz-track{flex:1;height:40px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bz-fill{height:100%;border-radius:4px;width:0;display:flex;align-items:center;padding:0 11px;transition:width 1.3s cubic-bezier(.4,0,.2,1)}
.bz-fill.c0{background:linear-gradient(90deg,var(--amber2),var(--amber))}.bz-fill.c1{background:linear-gradient(90deg,var(--blue2),var(--blue))}
.bz-fill.c2{background:linear-gradient(90deg,var(--teal2),var(--teal))}.bz-fill.c3{background:linear-gradient(90deg,var(--slate2),var(--slate))}
.bz-pct{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:rgba(0,0,0,.8);white-space:nowrap;opacity:0;transition:opacity .4s ease .8s}
.bz-pct.vis{opacity:1}
.bz-stim{font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);min-width:68px;text-align:right;flex-shrink:0}
.cmp{margin-top:16px}
.cmp-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.cmp-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.cmp-name{font-size:11px;font-weight:600;min-width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cmp-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.cmp-bar{height:7px;border-radius:2px;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.cmp-bar.loc.c0{background:var(--amber)}.cmp-bar.loc.c1{background:var(--blue)}.cmp-bar.loc.c2{background:var(--teal)}.cmp-bar.loc.c3{background:var(--slate)}
.cmp-bar.glob{background:var(--dim);opacity:.5}
.cmp-pcts{font-family:'Space Mono',monospace;font-size:10px;min-width:80px;text-align:right;color:var(--muted)}

/* NEU-Banner */
.neu{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--teal);color:#000;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:10px 24px;display:flex;align-items:center;justify-content:center;gap:12px;transform:translateY(-100%);transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none}
.neu.show{transform:translateY(0)}
.neu-dot{width:10px;height:10px;border-radius:50%;background:#000;animation:blink .8s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Footer */
.slide-foot{flex-shrink:0;padding:9px 34px 14px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--div)}
.nav-dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;max-width:60%}
.nd{width:5px;height:5px;border-radius:50%;background:var(--dim);transition:background .3s,width .3s;flex-shrink:0}
.nd.active{background:var(--amber);width:16px;border-radius:3px}
.nd.isnew{background:var(--teal)}
.foot-r{display:flex;align-items:center;gap:12px}
.foot-txt{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.t-wrap{width:26px;height:26px}.t-wrap svg{transform:rotate(-90deg)}
.t-bg{stroke:var(--bg3);stroke-width:2;fill:none}
.t-arc{stroke:var(--amber);stroke-width:2;fill:none;stroke-linecap:round;transition:stroke-dashoffset .1s linear}

/* Status-Chip oben rechts */
.status-chip{position:fixed;top:10px;right:12px;z-index:50;font-family:'Space Mono',monospace;font-size:9px;padding:3px 8px;border-radius:3px;letter-spacing:1px;text-transform:uppercase}
.status-chip.demo{background:rgba(245,166,35,.15);color:var(--amber);border:1px solid rgba(245,166,35,.3)}
.status-chip.live{background:rgba(46,207,160,.15);color:var(--teal);border:1px solid rgba(46,207,160,.3)}
.status-chip.err{background:rgba(224,108,58,.15);color:#e06c3a;border:1px solid rgba(224,108,58,.3)}

@media(max-width:860px){.root{grid-template-columns:1fr}.left{display:none}}
</style>
</head>
<body>

<div class="neu" id="neu-banner">
  <div class="neu-dot"></div>
  <span id="neu-text">Neues Ergebnis eingetroffen</span>

</div>

<div class="status-chip demo" id="status-chip">Demo</div>

<div class="root">
  <div class="left">
    <div class="logo-row"><div class="logo-dot"></div><div class="logo-label">Live-Ergebnisse</div></div>
    <div class="left-title">Bürgermeisterwahl</div>

          </svg>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   ▸  KONFIGURATION – hier anpassen
══════════════════════════════════════════════════════════ */
const CFG = {
  /* true  = Demo-Simulation (funktioniert immer, kein Server nötig)
     false = Echte Daten von komm.one über CORS-Proxy              */
  DEMO: true,

  /* Sekunden pro Folie */
  SLIDE_SEC: 12,

  /* Sekunden zwischen Daten-Refreshes (echter Modus) */
  REFRESH_SEC: 30,

  /* Demo: Sekunden bis zum nächsten simulierten Bezirk */
  DEMO_SEC: 8,

  /* Basis-URL der komm.one-Ergebnisseite */
  BASE: 'https://wahlergebnisse.komm.one/24/produktion/8425020/999-1337/20301224/buergermeisterwahl_gemeinde/',

  /* CORS-Proxy (wird vor die echte URL gesetzt) */
  PROXY: 'https://corsproxy.io/?url=',
};

/* ══════════════════════════════════════════════════════════
   ▸  BEZIRK-LISTE
══════════════════════════════════════════════════════════ */
const BEZIRKE = [
  {url:'ergebnisse_stimmbezirk_08425020-001.html', name:'001 Rathaus, Karlstraße 2',               nr:'001', ort:'Blaubeuren', adresse:'Karlstraße 2'},
  {url:'ergebnisse_stimmbezirk_08425020-002.html', name:'002 Johannes-Montini-Haus',               nr:'002', ort:'Blaubeuren', adresse:'Karlstraße 53'},
  {url:'ergebnisse_stimmbezirk_08425020-003.html', name:'003 Johannes-Montini-Haus ZVU',           nr:'003', ort:'Blaubeuren', adresse:'Karlstraße 53'},
  {url:'ergebnisse_stimmbezirk_08425020-004.html', name:'004 Gemeindehaus Gerhausen',              nr:'004', ort:'Gerhausen',  adresse:'Schulstraße 26'},
  {url:'ergebnisse_stimmbezirk_08425020-005.html', name:'005 Karl-Spohn-Realschule',               nr:'005', ort:'Blaubeuren', adresse:'Helfensteinerstrasse 12'},
  {url:'ergebnisse_stimmbezirk_08425020-006.html', name:'006 Rathaus Asch',                        nr:'006', ort:'Asch',       adresse:'Bei der Hüle 1'},
  {url:'ergebnisse_stimmbezirk_08425020-007.html', name:'007 Proberaum Musikverein Beiningen',     nr:'007', ort:'Beiningen',  adresse:'Im Eichert 3'},
  {url:'ergebnisse_stimmbezirk_08425020-008.html', name:'008 Feuerwehrgerätehaus Pappelau',        nr:'008', ort:'Pappelau',   adresse:'Römerstraße 22'},
  {url:'ergebnisse_stimmbezirk_08425020-009.html', name:'009 Fr. Schulhaus Erstetten',             nr:'009', ort:'Erstetten',  adresse:'Schleichtalstraße 32'},
  {url:'ergebnisse_stimmbezirk_08425020-010.html', name:'010 Zehntscheuer Seißen',                nr:'010', ort:'Seißen',     adresse:'Albstraße 74'},
  {url:'ergebnisse_stimmbezirk_08425020-011.html', name:'011 Dorfgemeinschaftshaus Sonderbuch',    nr:'011', ort:'Sonderbuch', adresse:'Blaubeurer Str. 12'},
  {url:'ergebnisse_stimmbezirk_08425020-012.html', name:'012 altes Schulhaus Weiler',              nr:'012', ort:'Weiler',     adresse:'Siedlungsstraße 1'},
  {url:'ergebnisse_stimmbezirk_08425020-013.html', name:'013 Grundschule Blaubeuren',              nr:'013', ort:'Blaubeuren', adresse:'Alberstraße 3'},
  {url:'ergebnisse_stimmbezirk_08425020-014.html', name:'014 Mehrzweckhalle Seißen',               nr:'014', ort:'Seißen',     adresse:'Flurstraße 55'},
  {url:'ergebnisse_briefwahlbezirk_08425020-999-1.html', name:'Briefwahl 1', nr:'BW1', ort:'Briefwahl', adresse:'—'},
  {url:'ergebnisse_briefwahlbezirk_08425020-999-2.html', name:'Briefwahl 2', nr:'BW2', ort:'Briefwahl', adresse:'—'},
  {url:'ergebnisse_briefwahlbezirk_08425020-999-3.html', name:'Briefwahl 3', nr:'BW3', ort:'Briefwahl', adresse:'—'},
  {url:'ergebnisse_briefwahlbezirk_08425020-999-4.html', name:'Briefwahl 4', nr:'BW4', ort:'Briefwahl', adresse:'—'},
];

/* Demo-Stimmdaten je Bezirk */
const DEMO_STIMMEN = [
  [100,80,70,50],[95,85,75,45],[88,82,78,52],[110,75,72,43],
  [92,90,65,53],[105,78,80,37],[98,84,68,50],[87,91,71,51],
  [103,79,74,44],[96,86,70,48],[99,81,73,47],[101,83,69,47],
  [94,88,76,42],[107,77,66,50],[90,82,72,56],[93,85,71,51],
  [97,80,75,48],[102,84,68,46],
];
const DEMO_NAMEN = [
  {name:'Kaczmarek',vorname:'Viktor'},
  {name:'Mikat',    vorname:'Mirijam'},
  {name:'Wähler ben. Personen',vorname:''},
  {name:'Menholz',  vorname:'Robin'},
];

/* ══════════════════════════════════════════════════════════
   ▸  STATE
══════════════════════════════════════════════════════════ */
const G = {
  candidates:[], stichwahl:[],
  beteiligung:'—', waehler:0, berechtigt:0, ungueltig:0,
  ausgezaehlt:0, gesamt:18,
  updateTime:null, datum:'24. Dezember 2030 · Testwahl',
  bezirke: BEZIRKE.map(b=>({...b, counted:false, time:null, candidates:[], beteiligung:'—', waehler:0, berechtigt:0, ungueltig:0}))
};

/* ══════════════════════════════════════════════════════════
   ▸  DEMO ENGINE
══════════════════════════════════════════════════════════ */
let demoIdx = 0;

function demoTick() {
  if (demoIdx >= G.bezirke.length) return;
  const bk    = G.bezirke[demoIdx];
  const data  = DEMO_STIMMEN[demoIdx];
  const total = data.reduce((a,b)=>a+b, 0);

  bk.counted     = true;
  bk.time        = nowTime();
  bk.waehler     = total;
  bk.berechtigt  = Math.round(total * 2.4);
  bk.ungueltig   = Math.floor(Math.random() * 3);
  bk.beteiligung = ((total / bk.berechtigt) * 100).toFixed(1).replace('.', ',') + ' %';
  bk.candidates  = DEMO_NAMEN.map((n,i) => ({
    name: n.name, vorname: n.vorname,
    stimmen: data[i],
    anteil: +((data[i] / total) * 100).toFixed(1)
  })).sort((a,b) => b.anteil - a.anteil);

  demoIdx++;
  recalcGlobal();
  onNewData([bk]);
}

/* ══════════════════════════════════════════════════════════
   ▸  ECHTER DATENABRUF (mit CORS-Proxy)
══════════════════════════════════════════════════════════ */
async function fetchURL(url) {
  const proxyURL = CFG.PROXY + encodeURIComponent(url);
  const r = await fetch(proxyURL, {cache:'no-cache'});
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.text();
}

async function loadReal() {
  const chip = document.getElementById('status-chip');
  try {
    const html     = await fetchURL(CFG.BASE + 'ergebnisse.html');
    const newBk    = parseMain(html);

    await Promise.all(newBk.map(async bk => {
      try {
        const html2 = await fetchURL(CFG.BASE + bk.url);
        parseBezirk(html2, bk);
      } catch(e) { console.warn('Bezirk-Fehler:', bk.name, e.message); }
    }));

    recalcGlobal();
    chip.className  = 'status-chip live';
    chip.textContent = 'Live';
    G.updateTime    = new Date();
    if (newBk.length > 0) onNewData(newBk);
    else { renderLeft(); refreshFixed(); }

  } catch(e) {
    console.warn('Datenabruf fehlgeschlagen:', e.message);
    chip.className  = 'status-chip err';
    chip.textContent = 'Fehler';
  }
}

/* ══════════════════════════════════════════════════════════
   ▸  HTML-PARSER
══════════════════════════════════════════════════════════ */
function parseMain(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const txt = doc.body.innerText;
  const mD  = txt.match(/(\d{1,2}\.\s+\w+\s+\d{4})/); if(mD) G.datum = mD[1];
  const mA  = txt.match(/Ausgezählte Gebiete:\s*(\d+)\s*von\s*(\d+)/);
  if(mA){ G.ausgezaehlt=+mA[1]; G.gesamt=+mA[2]; }
  const mBet = txt.match(/Wahlbeteiligung[^0-9]*([\d,]+\s*%)/);
  if(mBet) G.beteiligung = mBet[1];

  let bestCands = [];
  doc.querySelectorAll('table').forEach(tbl=>{
    const cands=[];
    tbl.querySelectorAll('tr').forEach(r=>{
      const cells=[...r.querySelectorAll('td')];
      if(cells.length<2)return;
      const n=cells[0].textContent.trim();
      const v=parseInt(cells[1].textContent.replace(/\D/g,''));
      const p=parseFloat((cells[2]||{}).textContent?.replace(',','.'));
      if(n==='Wahlberechtigte'){G.berechtigt=v;return}
      if(n==='Wählende'){G.waehler=v;return}
      if(n==='Ungültige Stimmen'){G.ungueltig=v;return}
      if(n&&!isNaN(v)&&!isNaN(p))cands.push({name:n,stimmen:v,anteil:p});
    });
    if(cands.length>bestCands.length)bestCands=cands;
  });

  if(bestCands.length){
    G.candidates=bestCands.map(c=>{
      const p=c.name.split(',').map(s=>s.trim());
      return{name:p[0],vorname:p[1]||'',stimmen:c.stimmen,anteil:c.anteil};
    }).sort((a,b)=>b.anteil-a.anteil);
    G.stichwahl=G.candidates.slice(0,2).map(c=>c.name);
  }

  // Welche Bezirke sind neu ausgezählt?
  const newlyDone=[];
  doc.querySelectorAll('table tr').forEach(r=>{
    const cells=[...r.querySelectorAll('td')];
    if(cells.length<2)return;
    const a=cells[0].querySelector('a'); if(!a)return;
    const rn=a.textContent.trim();
    const zeit=cells[cells.length-1].textContent.trim();
    if(zeit.match(/^\d{2}:\d{2}$/)){
      const bk=G.bezirke.find(b=>b.name===rn);
      if(bk&&!bk.counted){bk.counted=true;bk.time=zeit;newlyDone.push(bk);}
    }
  });
  return newlyDone;
}

function parseBezirk(html, bk) {
  const doc=new DOMParser().parseFromString(html,'text/html');
  const txt=doc.body.innerText;
  const mB=txt.match(/Wahlbeteiligung[^0-9]*([\d,]+\s*%)/);
  if(mB)bk.beteiligung=mB[1];
  let best=[];
  doc.querySelectorAll('table').forEach(tbl=>{
    const c=[];
    tbl.querySelectorAll('tr').forEach(r=>{
      const cells=[...r.querySelectorAll('td')];
      if(cells.length<2)return;
      const n=cells[0].textContent.trim();
      const v=parseInt(cells[1].textContent.replace(/\D/g,''));
      const p=parseFloat((cells[2]||{}).textContent?.replace(',','.'));
      if(n==='Wahlberechtigte'){bk.berechtigt=v;return}
      if(n==='Wählende'){bk.waehler=v;return}
      if(n==='Ungültige Stimmen'){bk.ungueltig=v;return}
      if(n&&!isNaN(v)&&!isNaN(p))c.push({name:n,stimmen:v,anteil:p});
    });
    if(c.length>best.length)best=c;
  });
  if(best.length){
    bk.candidates=best.map(c=>{
      const p=c.name.split(',').map(s=>s.trim());
      return{name:p[0],vorname:p[1]||'',stimmen:c.stimmen,anteil:c.anteil};
    }).sort((a,b)=>b.anteil-a.anteil);
    bk.counted=true;
  }
}

/* ══════════════════════════════════════════════════════════
   ▸  GLOBALES ERGEBNIS BERECHNEN
══════════════════════════════════════════════════════════ */
function recalcGlobal() {
  const done=G.bezirke.filter(b=>b.counted&&b.candidates.length);
  G.ausgezaehlt=done.length;
  if(!done.length)return;
  const names=[...new Set(done.flatMap(b=>b.candidates.map(c=>c.name)))];
  const totals={};
  names.forEach(n=>totals[n]=0);
  done.forEach(bk=>bk.candidates.forEach(c=>{if(totals[c.name]!==undefined)totals[c.name]+=c.stimmen;}));
  const grand=Object.values(totals).reduce((a,b)=>a+b,0);
  G.candidates=names.map(n=>{
    const ex=done[0].candidates.find(c=>c.name===n)||{};
    return{name:n,vorname:ex.vorname||'',stimmen:totals[n],anteil:grand?+((totals[n]/grand)*100).toFixed(1):0};
  }).sort((a,b)=>b.anteil-a.anteil);
  G.stichwahl=G.candidates.slice(0,2).map(c=>c.name);
  G.waehler=done.reduce((s,b)=>s+(b.waehler||0),0);
  G.berechtigt=done.reduce((s,b)=>s+(b.berechtigt||0),0);
  G.ungueltig=done.reduce((s,b)=>s+(b.ungueltig||0),0);
  const bet=G.berechtigt>0?(G.waehler/G.berechtigt*100).toFixed(1):'—';
  G.beteiligung=bet!=='—'?bet.replace('.',',')+' %':'—';
  G.updateTime=new Date();
}

/* ══════════════════════════════════════════════════════════
   ▸  SLIDES ENGINE
══════════════════════════════════════════════════════════ */
let slides=[], currentIdx=0, timerStart=Date.now(), slideTimer=null;

function initSlides(){
  document.getElementById('slides-wrap').innerHTML='';
  slides=[];
  slides.push(addSlide('gesamt',null));
  slides.push(addSlide('auszaehlung',null));
  rebuildNav();
  activateSlide(0,true);
  startAutoAdvance();
}

function addSlide(type,bk){
  const el=document.createElement('div');
  el.className='slide';
  el.dataset.type=type;
  if(bk)el.dataset.bkUrl=bk.url;
  renderSlideContent(el,type,bk);
  document.getElementById('slides-wrap').appendChild(el);
  return{el,type,bk,isNew:false};
}

function renderSlideContent(el,type,bk){
  if(type==='gesamt')el.innerHTML=htmlGesamt();
  else if(type==='auszaehlung')el.innerHTML=htmlAuszaehlung();
  else el.innerHTML=htmlBezirk(bk);
}

function refreshFixed(){
  if(slides[0])renderSlideContent(slides[0].el,'gesamt',null);
  if(slides[1])renderSlideContent(slides[1].el,'auszaehlung',null);
  if(currentIdx<2)setTimeout(()=>animateBars(slides[currentIdx].el),100);
}

function onNewData(newBezirke){
  renderLeft();
  refreshFixed();
  const added=[];
  newBezirke.filter(bk=>bk.candidates.length>0).forEach(bk=>{
    const exists=slides.find(s=>s.bk&&s.bk.url===bk.url);
    if(!exists){
      const s=addSlide('bezirk',bk);
      s.isNew=true;
      slides.push(s);
      added.push(s);
    }else{
      renderSlideContent(exists.el,'bezirk',bk);
      exists.isNew=false;
    }
  });
  rebuildNav();
  if(added.length>0){
    showNeuBanner(newBezirke);
    // Neuen Slide nach kurzem Delay zeigen
    clearTimeout(slideTimer);
    slideTimer=setTimeout(()=>{
      goToSlide(slides.indexOf(added[0]));
      startAutoAdvance();
    }, Math.min(SLIDE_MS - (Date.now()-timerStart), 3000));
  }
  document.getElementById('pulse').style.background='var(--teal)';
}

const SLIDE_MS = CFG.SLIDE_SEC * 1000;

function startAutoAdvance(){
  clearTimeout(slideTimer);
  slideTimer=setTimeout(()=>{
    goToSlide((currentIdx+1)%slides.length);
    startAutoAdvance();
  }, SLIDE_MS);
}

function goToSlide(idx){
  if(idx===currentIdx||!slides[idx])return;
  slides[currentIdx].el.classList.add('exit');
  slides[currentIdx].el.classList.remove('active');
  setTimeout(()=>slides[currentIdx]&&slides[currentIdx].el.classList.remove('exit'),700);
  slides[idx].el.classList.add('active');
  slides[idx].isNew=false;
  currentIdx=idx;
  timerStart=Date.now();
  rebuildNav();
  updateFootTxt();
  setTimeout(()=>animateBars(slides[idx].el),200);
}

function activateSlide(idx,instant){
  slides.forEach((s,i)=>s.el.classList.toggle('active',i===idx));
  currentIdx=idx; timerStart=Date.now();
  rebuildNav(); updateFootTxt();
  setTimeout(()=>animateBars(slides[idx].el),instant?50:200);
}

function rebuildNav(){
  document.getElementById('nav-dots').innerHTML=slides.map((s,i)=>{
    let cls='nd';
    if(i===currentIdx)cls+=' active';
    else if(s.isNew)cls+=' isnew';
    const title=s.bk?s.bk.name:s.type;
    return `<div class="${cls}" title="${title}"></div>`;
  }).join('');
  updateFootTxt();
}

function updateFootTxt(){
  document.getElementById('foot-txt').textContent='Folie '+(currentIdx+1)+' / '+slides.length;
}

function animateBars(el){
  el.querySelectorAll('[data-pct]').forEach(b=>{b.style.width=b.dataset.pct+'%';const p=b.querySelector('.g-pct,.bz-pct');if(p)p.classList.add('vis');});
  el.querySelectorAll('[data-cmp]').forEach(b=>{b.style.width=b.dataset.cmp+'%';});
}

/* ══════════════════════════════════════════════════════════
   ▸  NEU-BANNER
══════════════════════════════════════════════════════════ */
let bannerT=null;
function showNeuBanner(bezirke){
  const b=document.getElementById('neu-banner');
  const namen=bezirke.map(bk=>bk.ort).join(', ');
  document.getElementById('neu-text').textContent=
    bezirke.length===1?'Neues Ergebnis: '+namen:bezirke.length+' neue Ergebnisse: '+namen;
  b.classList.add('show');
  clearTimeout(bannerT);
  bannerT=setTimeout(()=>b.classList.remove('show'),5000);
}

/* ══════════════════════════════════════════════════════════
   ▸  HTML BUILDER
══════════════════════════════════════════════════════════ */
function htmlGesamt(){
  if(!G.candidates.length)return`<div class="slide-lbl">Gesamtergebnis</div><div style="color:var(--muted);font-size:16px;margin-top:60px;text-align:center">Warte auf erste Ergebnisse …</div>`;
  const max=Math.max(...G.candidates.map(c=>c.anteil),1);
  return`<div class="slide-lbl">Gesamtergebnis · ${G.ausgezaehlt} von ${G.gesamt} Gebieten</div>`+
    G.candidates.map((c,i)=>{
      const bpct=(c.anteil/max*100).toFixed(1);
      const isSt=G.stichwahl.includes(c.name);
      return`<div class="g-cand">
        <div class="g-rank">${i+1}</div>
        <div class="g-name">${c.name}${isSt?'<span class="stw-tag">Stichwahl</span>':''}${c.vorname?`<br><span class="vn">${c.vorname}</span>`:''}
        </div>
        <div class="g-track"><div class="g-fill c${i}" data-pct="${bpct}"><span class="g-pct">${c.anteil.toFixed(1).replace('.',',')} %</span></div></div>
        <div class="g-stim">${c.stimmen.toLocaleString('de')} St.</div>
      </div>`;
    }).join('');
}

function htmlAuszaehlung(){
  return`<div class="slide-lbl">Auszählungsstand</div><div class="bk-grid">`+
    G.bezirke.map(b=>`<div class="bk-card${b.counted?' done':''}">
      <div class="bk-dot"></div>
      <div><div class="bk-name">${b.name}</div>${b.counted&&b.time?`<div class="bk-time">${b.time} Uhr</div>`:''}</div>
    </div>`).join('')+`</div>`;
}

function htmlBezirk(bk){
  if(!bk.candidates.length)return`<div class="slide-lbl">Bezirk ${bk.nr}</div><div style="color:var(--muted)">Keine Daten</div>`;
  const max=Math.max(...bk.candidates.map(c=>c.anteil),1);
  const gMax=G.candidates.length?Math.max(...G.candidates.map(c=>c.anteil),1):1;
  const cands=bk.candidates.map((c,i)=>`<div class="bz-row">
    <div class="bz-name">${c.name}${c.vorname?`<br><span class="vn">${c.vorname}</span>`:''}</div>
    <div class="bz-track"><div class="bz-fill c${i}" data-pct="${(c.anteil/max*100).toFixed(1)}"><span class="bz-pct">${c.anteil.toFixed(1).replace('.',',')} %</span></div></div>
    <div class="bz-stim">${c.stimmen.toLocaleString('de')} St.</div>
  </div>`).join('');

  const cmpRows=G.ausgezaehlt>1?bk.candidates.map((c,i)=>{
    const gc=G.candidates.find(g=>g.name===c.name);
    const diff=gc?(c.anteil-gc.anteil):null;
    const ds=diff!==null?(diff>=0?'+':'')+diff.toFixed(1).replace('.',',')+' %':'';
    const dc=diff!==null&&diff>=0?'var(--teal)':'#e06c3a';
    return`<div class="cmp-row">
      <div class="cmp-name">${c.name}</div>
      <div class="cmp-bars">
        <div class="cmp-bar loc c${i}" data-cmp="${(c.anteil/max*100).toFixed(1)}"></div>
        ${gc?`<div class="cmp-bar glob" data-cmp="${(gc.anteil/gMax*100).toFixed(1)}"></div>`:''}
      </div>
      <div class="cmp-pcts">${c.anteil.toFixed(1).replace('.',',')} % <span style="color:${dc}">${ds}</span></div>
    </div>`;
  }).join(''):'';

  return`<div class="slide-lbl">Wahlbezirk ${bk.nr} · ${bk.time?bk.time+' Uhr':'ausgezählt'}</div>
    <div class="bz-ort">${bk.ort}</div><div class="bz-addr">${bk.name}</div>
    <div class="bz-stats">
      <div class="bs"><div class="bsl">Beteiligung</div><div class="bsv amber">${bk.beteiligung}</div></div>
      <div class="bs"><div class="bsl">Wählende</div><div class="bsv">${(bk.waehler||0).toLocaleString('de')}</div></div>
      <div class="bs"><div class="bsl">Berechtigt</div><div class="bsv">${(bk.berechtigt||0).toLocaleString('de')}</div></div>
    </div>
    <div class="bz-cands">${cands}</div>
    ${G.ausgezaehlt>1?`<div class="cmp"><div class="cmp-title">Vergleich Bezirk vs. Gesamt <span style="opacity:.4">(oben=Bezirk · unten=Gesamt)</span></div>${cmpRows}</div>`:''}`;
}

/* ══════════════════════════════════════════════════════════
   ▸  LINKE LEISTE
══════════════════════════════════════════════════════════ */
function renderLeft(){
  document.getElementById('l-datum').textContent=G.datum||'—';
  document.getElementById('l-bet').textContent=G.beteiligung;
  document.getElementById('l-wae').textContent=G.waehler?G.waehler.toLocaleString('de'):'—';
  document.getElementById('l-ber').textContent=G.berechtigt?G.berechtigt.toLocaleString('de'):'—';
  document.getElementById('l-ung').textContent=G.ungueltig!==undefined?G.ungueltig.toLocaleString('de'):'—';
  document.getElementById('l-ausz-txt').textContent=G.ausgezaehlt+' / '+G.gesamt;
  document.getElementById('l-ausz-bar').style.width=(G.gesamt>0?G.ausgezaehlt/G.gesamt*100:0).toFixed(1)+'%';
  if(G.updateTime)document.getElementById('l-upd').textContent='Stand '+G.updateTime.toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

  const cont=document.getElementById('mini-cands');
  if(!G.candidates.length){cont.innerHTML='<div style="color:var(--muted);font-size:12px">Warte auf erste Ergebnisse …</div>';return;}
  const max=Math.max(...G.candidates.map(c=>c.anteil),1);
  cont.innerHTML=G.candidates.map((c,i)=>`<div class="mini-cand">
    <div class="mini-hdr">
      <div><span class="mini-name">${c.name}</span>${c.vorname?`<span class="mini-sub"> ${c.vorname}</span>`:''}${G.stichwahl.includes(c.name)?'<span class="stw-tag">Stichw.</span>':''}</div>
      <div class="mini-pct c${i}">${c.anteil.toFixed(1).replace('.',',')} %</div>
    </div>
    <div class="mini-track"><div class="mini-fill c${i}" id="mf${i}" style="width:0%"></div></div>
    <div class="mini-st">${c.stimmen.toLocaleString('de')} Stimmen</div>
  </div>`).join('');
  setTimeout(()=>G.candidates.forEach((_,i)=>{const b=document.getElementById('mf'+i);if(b)b.style.width=((G.candidates[i].anteil/max)*100).toFixed(1)+'%';}),200);
}

/* ══════════════════════════════════════════════════════════
   ▸  TIMER RING
══════════════════════════════════════════════════════════ */
const arc=document.getElementById('t-arc');
setInterval(()=>{const p=Math.min((Date.now()-timerStart)/SLIDE_MS,1);if(arc)arc.setAttribute('stroke-dashoffset',(62.8*(1-p)).toFixed(2));},100);

/* ══════════════════════════════════════════════════════════
   ▸  HILFSFUNKTIONEN
══════════════════════════════════════════════════════════ */
function nowTime(){return new Date().toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit'});}

/* ══════════════════════════════════════════════════════════
   ▸  START
══════════════════════════════════════════════════════════ */
initSlides();
renderLeft();

if(CFG.DEMO){
  document.getElementById('status-chip').className='status-chip demo';
  document.getElementById('status-chip').textContent='Demo';
  // Sofort starten + Intervall
  setTimeout(demoTick, 1500);
  setInterval(demoTick, CFG.DEMO_SEC * 1000);
} else {
  document.getElementById('status-chip').className='status-chip live';
  document.getElementById('status-chip').textContent='Lade …';
  loadReal();
  setInterval(loadReal, CFG.REFRESH_SEC * 1000);
}
