<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bürgermeisterwahl Blaubeuren 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blau:   #013A50;
  --blau2:  #16479F;
  --gelb:   #FFDD00;
  --bg:     #F4F7FA;
  --white:  #FFFFFF;
  --div:    #D0DCE8;
  --text:   #0D1A26;
  --muted:  #5A7090;
  --font:   Arial, Helvetica, sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
.root{display:grid;grid-template-columns:280px 1fr;height:100vh}

/* ── Linke Leiste – einfarbig Blau ── */
.left{background:var(--blau);display:flex;flex-direction:column;overflow:hidden}

.left-logo{
  background:#fff;
  padding:16px 22px 14px;
  border-bottom:3px solid var(--blau);
}
.logo-img{
  width:190px;
  display:block;
}
.wahl-label{font-size:11px;color:var(--muted);margin-top:8px}

.left-body{flex:1;overflow:hidden;padding:18px 20px;display:flex;flex-direction:column}

.section-label{
  font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.45);margin-bottom:10px;
}

.mini-cand{margin-bottom:12px}
.mini-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.mini-name{font-size:13px;font-weight:700;color:#fff}
.mini-sub{font-size:11px;color:rgba(255,255,255,.45)}
.mini-pct{font-size:13px;font-weight:700;font-family:monospace;color:rgba(255,255,255,.9)}
.mini-track{height:5px;background:rgba(255,255,255,.15);overflow:hidden}
.mini-fill{height:100%;width:0;background:rgba(255,255,255,.7);transition:width 1.4s cubic-bezier(.4,0,.2,1)}
.mini-fill.p1{background:var(--gelb)}
.mini-st{font-size:9px;color:rgba(255,255,255,.3);margin-top:2px}

.stw-tag{
  display:inline-block;font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  padding:2px 6px;background:var(--gelb);color:#000;margin-left:6px;vertical-align:middle;
}

.ldiv{height:1px;background:rgba(255,255,255,.12);margin:10px -20px 14px}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat-tile{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:9px 11px}
.stl{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px}
.stv{font-size:18px;font-weight:700;font-family:monospace;color:#fff;line-height:1}
.stv.gelb{color:var(--gelb)}

.prog{margin-top:14px}
.prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-txt{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.prog-num{font-size:12px;font-weight:700;font-family:monospace;color:rgba(255,255,255,.8)}
.prog-track{height:4px;background:rgba(255,255,255,.15);overflow:hidden}
.prog-fill{height:100%;background:rgba(255,255,255,.7);transition:width 1s ease}

.left-foot{
  padding:10px 20px;border-top:1px solid rgba(255,255,255,.12);
  background:rgba(0,0,0,.15);
  display:flex;align-items:center;justify-content:space-between;
}
.upd{font-size:9px;font-family:monospace;color:rgba(255,255,255,.3)}
.pulse{width:7px;height:7px;border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,.4)}50%{box-shadow:0 0 0 5px rgba(255,255,255,0)}}

/* ── Rechte Seite ── */
.right{display:flex;flex-direction:column;overflow:hidden}
.slides-wrap{flex:1;position:relative;overflow:hidden}
.slide{
  position:absolute;inset:0;display:flex;flex-direction:column;
  opacity:0;transform:translateY(12px);
  transition:opacity .6s ease,transform .6s ease;
  pointer-events:none;overflow:hidden;
}
.slide.active{opacity:1;transform:translateY(0);pointer-events:all}
.slide.exit{opacity:0;transform:translateY(-12px)}

/* Typ-Kopfzeile – einfarbig Blau, kein Gradient */
.type-bar{
  background:var(--blau);
  padding:10px 28px;
  display:flex;align-items:center;gap:12px;flex-shrink:0;
}
.type-icon{
  width:30px;height:30px;background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.type-icon svg{width:16px;height:16px;fill:#fff}
.type-label{
  font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
  color:rgba(255,255,255,.65);
}
.type-sub{font-size:13px;font-weight:700;color:#fff;margin-left:auto}

/* Slide-Inhalt – hell und klar */
.slide-body{flex:1;padding:20px 28px 12px;overflow:hidden;display:flex;flex-direction:column;background:var(--bg)}

/* Bezirk-Hero */
.bezirk-hero{margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--blau)}
.bezirk-ort{
  font-size:clamp(44px,7vw,84px);font-weight:700;
  color:var(--blau);line-height:1;
}
.bezirk-meta{display:flex;align-items:center;gap:10px;margin-top:6px}
.bezirk-badge{
  background:var(--blau);color:#fff;
  font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:3px 10px;
}
.bezirk-adresse{font-size:13px;color:var(--muted)}

.bz-stats{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.bz-stat{background:var(--white);border-left:3px solid var(--blau);padding:7px 14px}
.bz-stat-l{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.bz-stat-v{font-size:18px;font-weight:700;font-family:monospace;color:var(--text);line-height:1}
.bz-stat-v.blau{color:var(--blau)}

/* Kandidaten – alle in Blau-Tönen */
.cands{display:flex;flex-direction:column;gap:8px}
.cand-row{display:flex;align-items:center;gap:12px}
.cand-rank{font-size:13px;font-weight:700;font-family:monospace;color:var(--muted);width:20px;flex-shrink:0;text-align:center}
.cand-name{
  font-size:clamp(15px,2vw,24px);font-weight:700;
  line-height:1.15;min-width:190px;flex-shrink:0;color:var(--text);
}
.cand-name .vn{font-weight:400;color:var(--muted);font-size:.85em}
.cand-track{flex:1;overflow:hidden;background:var(--white);border:1px solid var(--div)}
.cand-fill{
  height:52px;width:0;display:flex;align-items:center;padding:0 14px;
  transition:width 1.4s cubic-bezier(.4,0,.2,1);
}
.slide-body.big .cand-fill{height:62px}
.slide-body.big .cand-name{font-size:clamp(18px,2.4vw,28px);min-width:210px}

/* Alle Balken: Blau-Familie – kein Regenbogen */
.fill-c0{background:var(--blau)}
.fill-c1{background:#1A5E7A}
.fill-c2{background:#2E7A9A}
.fill-c3{background:#4A9AB8}

.cand-pct{
  font-size:clamp(13px,1.7vw,19px);font-weight:700;font-family:monospace;
  color:#fff;white-space:nowrap;
  opacity:0;transition:opacity .4s ease .9s;
}
.cand-pct.vis{opacity:1}
.cand-stimmen{font-size:clamp(11px,1.3vw,14px);font-family:monospace;color:var(--muted);min-width:85px;text-align:right;flex-shrink:0}

/* Auszählung */
.bk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:7px;align-content:start}
.bk-card{background:var(--white);border:1px solid var(--div);padding:9px 13px;display:flex;align-items:flex-start;gap:9px;transition:border-color .5s,background .5s}
.bk-card.done{background:#EAF3F5;border-color:#1A7A8A;border-left:3px solid var(--blau)}
.bk-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px;background:var(--div);border:2px solid var(--muted);transition:all .5s}
.bk-card.done .bk-dot{background:var(--blau);border-color:var(--blau)}
.bk-name{font-size:11px;font-weight:700;line-height:1.3;color:var(--muted)}
.bk-card.done .bk-name{color:var(--text)}
.bk-time{font-size:10px;font-family:monospace;color:var(--blau);margin-top:2px}

/* Vergleich */
.cmp{margin-top:10px}
.cmp-title{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.cmp-row{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.cmp-name{font-size:11px;font-weight:700;min-width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--muted)}
.cmp-bars{flex:1;display:flex;flex-direction:column;gap:3px}
.cmp-bar{height:7px;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.cmp-bar.loc.c0{background:var(--blau)}.cmp-bar.loc.c1{background:#1A5E7A}.cmp-bar.loc.c2{background:#2E7A9A}.cmp-bar.loc.c3{background:#4A9AB8}
.cmp-bar.glob{background:var(--div)}
.cmp-pcts{font-size:10px;font-family:monospace;min-width:85px;text-align:right;color:var(--muted)}

.warte{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.warte-text{font-size:18px;font-weight:700;color:var(--muted)}

/* NEU-Banner */
.neu{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--gelb);color:#000;
  font-size:20px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  padding:12px 24px;display:flex;align-items:center;justify-content:center;gap:14px;
  transform:translateY(-100%);transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none;
}
.neu.show{transform:translateY(0)}
.neu-dot{width:10px;height:10px;border-radius:50%;background:#000;animation:blink .8s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Footer */
.slide-foot{
  flex-shrink:0;padding:8px 28px 11px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--div);background:var(--white);
}
.nav-dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;max-width:55%}
.nd{width:7px;height:7px;border-radius:50%;background:var(--div);transition:background .3s,width .3s;flex-shrink:0}
.nd.active{background:var(--blau);width:20px;border-radius:0}
.nd.isnew{background:var(--gelb)}
.foot-r{display:flex;align-items:center;gap:10px}
.foot-txt{font-size:10px;font-family:monospace;color:var(--muted)}
.t-wrap{width:26px;height:26px}.t-wrap svg{transform:rotate(-90deg)}
.t-bg{stroke:var(--div);stroke-width:2.5;fill:none}
.t-arc{stroke:var(--blau);stroke-width:2.5;fill:none;stroke-linecap:square;transition:stroke-dashoffset .1s linear}

.status-chip{
  font-size:9px;font-family:monospace;
  padding:2px 8px;letter-spacing:1px;text-transform:uppercase;
}
.status-chip.live{background:#E0F0EA;color:#006040;border:1px solid #006040}
.status-chip.wait{background:#FFFCE0;color:#6A5800;border:1px solid #C8A800}
.status-chip.err{background:#FDEAEA;color:#C03030;border:1px solid #C03030}

@media(max-width:900px){.root{grid-template-columns:1fr}.left{display:none}}
</style>
</head>

<script>
const SLIDE_SEC=12,REFRESH_SEC=20,DATA_URL='./daten.json';
const G={candidates:[],stichwahl:[],beteiligung:'—',waehler:0,berechtigt:0,ungueltig:0,ausgezaehlt:0,gesamt:18,updateTime:null,datum:'2026',bezirke:[]};
let knownCounted=new Set();
async function loadData(){const chip=document.getElementById('status-chip');try{const r=await fetch(DATA_URL+'?t='+Date.now(),{cache:'no-store',headers:{'Pragma':'no-cache','Cache-Control':'no-cache'}});if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();chip.className='status-chip live';chip.textContent='Live';if(d.datum)G.datum=d.datum;if(d.ausgezaehlt!==undefined)G.ausgezaehlt=d.ausgezaehlt;if(d.gesamt!==undefined)G.gesamt=d.gesamt;if(d.globalStats){G.beteiligung=d.globalStats.beteiligung||'—';G.waehler=d.globalStats.waehler||0;G.berechtigt=d.globalStats.berechtigt||0;G.ungueltig=d.globalStats.ungueltig||0;}if(d.globalCandidates&&d.globalCandidates.length){G.candidates=d.globalCandidates;G.stichwahl=G.candidates.slice(0,2).map(c=>c.name);}if(d.bezirke)G.bezirke=d.bezirke;G.updateTime=new Date(d.fetchedAt||Date.now());const newlyDone=G.bezirke.filter(b=>b.counted&&b.candidates&&b.candidates.length>0&&!knownCounted.has(b.url));renderLeft();refreshFixed();if(newlyDone.length>0){newlyDone.forEach(b=>knownCounted.add(b.url));onNewData(newlyDone);}document.getElementById('pulse').style.background='rgba(255,255,255,.6)';}catch(e){console.warn('Ladefehler:',e.message);chip.className='status-chip err';chip.textContent='Fehler';}}
let slides=[],currentIdx=0,timerStart=Date.now(),slideTimer=null;const SLIDE_MS=SLIDE_SEC*1000;
function initSlides(){document.getElementById('slides-wrap').innerHTML='';slides=[];slides.push(addSlide('gesamt',null));slides.push(addSlide('auszaehlung',null));rebuildNav();activateSlide(0,true);startAutoAdvance();}
function addSlide(type,bk){const el=document.createElement('div');el.className='slide';renderSlideContent(el,type,bk);document.getElementById('slides-wrap').appendChild(el);return{el,type,bk,isNew:false};}
function renderSlideContent(el,type,bk){if(type==='gesamt')el.innerHTML=htmlGesamt();else if(type==='auszaehlung')el.innerHTML=htmlAuszaehlung();else el.innerHTML=htmlBezirk(bk);}
function refreshFixed(){if(slides[0])renderSlideContent(slides[0].el,'gesamt',null);if(slides[1])renderSlideContent(slides[1].el,'auszaehlung',null);if(currentIdx<2)setTimeout(()=>animateBars(slides[currentIdx].el),100);}
function onNewData(nb){const added=[];nb.filter(bk=>bk.candidates&&bk.candidates.length>0).forEach(bk=>{const ex=slides.find(s=>s.bk&&s.bk.url===bk.url);if(!ex){const s=addSlide('bezirk',bk);s.isNew=true;slides.push(s);added.push(s);}else{renderSlideContent(ex.el,'bezirk',bk);ex.isNew=false;}});rebuildNav();if(added.length>0){showNeuBanner(nb);clearTimeout(slideTimer);slideTimer=setTimeout(()=>{goToSlide(slides.indexOf(added[0]));startAutoAdvance();},Math.min(SLIDE_MS-(Date.now()-timerStart),3000));}}
function startAutoAdvance(){clearTimeout(slideTimer);slideTimer=setTimeout(()=>{goToSlide((currentIdx+1)%slides.length);startAutoAdvance();},SLIDE_MS);}
function goToSlide(idx){if(idx===currentIdx||!slides[idx])return;slides[currentIdx].el.classList.add('exit');slides[currentIdx].el.classList.remove('active');setTimeout(()=>slides[currentIdx]&&slides[currentIdx].el.classList.remove('exit'),700);slides[idx].el.classList.add('active');slides[idx].isNew=false;currentIdx=idx;timerStart=Date.now();rebuildNav();updateFootTxt();setTimeout(()=>animateBars(slides[idx].el),200);}
function activateSlide(idx,instant){slides.forEach((s,i)=>s.el.classList.toggle('active',i===idx));currentIdx=idx;timerStart=Date.now();rebuildNav();updateFootTxt();setTimeout(()=>animateBars(slides[idx].el),instant?50:200);}
function rebuildNav(){document.getElementById('nav-dots').innerHTML=slides.map((s,i)=>{let c='nd';if(i===currentIdx)c+=' active';else if(s.isNew)c+=' isnew';return'<div class="'+c+'"></div>';}).join('');updateFootTxt();}
function updateFootTxt(){document.getElementById('foot-txt').textContent='Folie '+(currentIdx+1)+' / '+slides.length;}
function animateBars(el){el.querySelectorAll('[data-pct]').forEach(b=>{b.style.width=b.dataset.pct+'%';const p=b.querySelector('.cand-pct');if(p)p.classList.add('vis');});el.querySelectorAll('[data-cmp]').forEach(b=>b.style.width=b.dataset.cmp+'%');}
let bannerT=null;
function showNeuBanner(bz){const b=document.getElementById('neu-banner');document.getElementById('neu-text').textContent=bz.length===1?'Neues Ergebnis: '+bz[0].ort:bz.length+' neue Ergebnisse';b.classList.add('show');clearTimeout(bannerT);bannerT=setTimeout(()=>b.classList.remove('show'),5000);}
const IGESAMT='<svg viewBox="0 0 18 18"><rect x="1" y="9" width="4" height="8"/><rect x="7" y="5" width="4" height="12"/><rect x="13" y="1" width="4" height="16"/></svg>';
const IAUSZ='<svg viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" fill="none" stroke="#fff" stroke-width="2"/><path d="M9 6v4l3 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>';
const IBEZ='<svg viewBox="0 0 18 18"><path d="M9 1L1 7v10h6V11h4v6h6V7z" fill="#fff"/></svg>';
function typeBar(icon,label,sub){return'<div class="type-bar"><div class="type-icon">'+icon+'</div><div class="type-label">'+label+'</div>'+(sub?'<div class="type-sub">'+sub+'</div>':'')+'</div>';}
function htmlGesamt(){if(!G.candidates.length)return typeBar(IGESAMT,'Gesamtergebnis','')+'<div class="slide-body"><div class="warte"><div class="warte-text">Warte auf erste Ergebnisse …</div></div></div>';const max=Math.max(...G.candidates.map(c=>c.anteil),1);return typeBar(IGESAMT,'Gesamtergebnis',G.ausgezaehlt+' von '+G.gesamt+' Gebieten')+'<div class="slide-body big"><div class="cands">'+G.candidates.map((c,i)=>'<div class="cand-row"><div class="cand-rank">'+(i+1)+'</div><div class="cand-name">'+c.name+(G.stichwahl.includes(c.name)?'<span class="stw-tag">Stichwahl</span>':'')+( c.vorname?'<br><span class="vn">'+c.vorname+'</span>':'')+'</div><div class="cand-track"><div class="cand-fill fill-c'+i+'" data-pct="'+(c.anteil/max*100).toFixed(1)+'"><span class="cand-pct">'+c.anteil.toFixed(1).replace('.',',')+' %</span></div></div><div class="cand-stimmen">'+c.stimmen.toLocaleString('de')+' Stimmen</div></div>').join('')+'</div></div>';}
function htmlAuszaehlung(){return typeBar(IAUSZ,'Auszählungsstand',G.ausgezaehlt+' von '+G.gesamt)+'<div class="slide-body"><div class="bk-grid">'+G.bezirke.map(b=>'<div class="bk-card'+(b.counted?' done':'')+'"><div class="bk-dot"></div><div><div class="bk-name">'+b.name+'</div>'+(b.counted&&b.time?'<div class="bk-time">'+b.time+' Uhr</div>':'')+'</div></div>').join('')+'</div></div>';}
function htmlBezirk(bk){if(!bk.candidates||!bk.candidates.length)return typeBar(IBEZ,'Wahlbezirk '+bk.nr,'')+'<div class="slide-body"><div class="warte"><div class="warte-text">Keine Daten</div></div></div>';const max=Math.max(...bk.candidates.map(c=>c.anteil),1);const gMax=G.candidates.length?Math.max(...G.candidates.map(c=>c.anteil),1):1;const cands=bk.candidates.map((c,i)=>'<div class="cand-row"><div class="cand-rank">'+(i+1)+'</div><div class="cand-name">'+c.name+(c.vorname?'<br><span class="vn">'+c.vorname+'</span>':'')+'</div><div class="cand-track"><div class="cand-fill fill-c'+i+'" data-pct="'+(c.anteil/max*100).toFixed(1)+'"><span class="cand-pct">'+c.anteil.toFixed(1).replace('.',',')+' %</span></div></div><div class="cand-stimmen">'+(c.stimmen||0).toLocaleString('de')+' Stimmen</div></div>').join('');const cmpRows=G.ausgezaehlt>1?bk.candidates.map((c,i)=>{const gc=G.candidates.find(g=>g.name===c.name);const diff=gc?(c.anteil-gc.anteil):null;const ds=diff!==null?(diff>=0?'+':'')+diff.toFixed(1).replace('.',',')+' %':''  ;const dc=diff!==null&&diff>=0?'#006F74':'#C03030';return'<div class="cmp-row"><div class="cmp-name">'+c.name+'</div><div class="cmp-bars"><div class="cmp-bar loc c'+i+'" data-cmp="'+(c.anteil/max*100).toFixed(1)+'"></div>'+(gc?'<div class="cmp-bar glob" data-cmp="'+(gc.anteil/gMax*100).toFixed(1)+'"></div>':'')+'</div><div class="cmp-pcts">'+c.anteil.toFixed(1).replace('.',',')+' % <span style="color:'+dc+'">'+ds+'</span></div></div>';}).join(''):''  ;return typeBar(IBEZ,'Wahlbezirk '+bk.nr,bk.time?bk.time+' Uhr':'')+'<div class="slide-body"><div class="bezirk-hero"><div class="bezirk-ort">'+bk.ort+'</div><div class="bezirk-meta"><span class="bezirk-badge">Bezirk '+bk.nr+'</span><span class="bezirk-adresse">'+bk.name+'</span></div></div><div class="bz-stats"><div class="bz-stat"><div class="bz-stat-l">Beteiligung</div><div class="bz-stat-v blau">'+bk.beteiligung+'</div></div><div class="bz-stat"><div class="bz-stat-l">Wählende</div><div class="bz-stat-v">'+(bk.waehler||0).toLocaleString('de')+'</div></div><div class="bz-stat"><div class="bz-stat-l">Berechtigt</div><div class="bz-stat-v">'+(bk.berechtigt||0).toLocaleString('de')+'</div></div></div><div class="cands">'+cands+'</div>'+(G.ausgezaehlt>1?'<div class="cmp"><div class="cmp-title">Vergleich mit Gesamtergebnis <span style="opacity:.5">(oben=Bezirk · unten=Gesamt)</span></div>'+cmpRows+'</div>':'')+'</div>';}
function renderLeft(){document.getElementById('l-datum').textContent=G.datum||'2026';document.getElementById('l-bet').textContent=G.beteiligung;document.getElementById('l-wae').textContent=G.waehler?G.waehler.toLocaleString('de'):'—';document.getElementById('l-ber').textContent=G.berechtigt?G.berechtigt.toLocaleString('de'):'—';document.getElementById('l-ung').textContent=G.ungueltig!==undefined?G.ungueltig.toLocaleString('de'):'—';document.getElementById('l-ausz-txt').textContent=G.ausgezaehlt+' / '+G.gesamt;document.getElementById('l-ausz-bar').style.width=(G.gesamt>0?G.ausgezaehlt/G.gesamt*100:0).toFixed(1)+'%';if(G.updateTime)document.getElementById('l-upd').textContent='Daten '+G.updateTime.toLocaleTimeString('de',{hour:'2-digit',minute:'2-digit',second:'2-digit'});const cont=document.getElementById('mini-cands');if(!G.candidates.length){cont.innerHTML='<div style="color:rgba(255,255,255,.3);font-size:12px;padding:8px 0">Warte …</div>';return;}const max=Math.max(...G.candidates.map(c=>c.anteil),1);cont.innerHTML=G.candidates.map((c,i)=>'<div class="mini-cand"><div class="mini-hdr"><div><span class="mini-name">'+c.name+'</span>'+(c.vorname?' <span class="mini-sub">'+c.vorname+'</span>':'')+( G.stichwahl.includes(c.name)?'<span class="stw-tag">Stichw.</span>':'')+'</div><div class="mini-pct'+(i===0?' p1':'')+'">'+c.anteil.toFixed(1).replace('.',',')+' %</div></div><div class="mini-track"><div class="mini-fill'+(i===0?' p1':'')+'" id="mf'+i+'" style="width:0%"></div></div><div class="mini-st">'+c.stimmen.toLocaleString('de')+' Stimmen</div></div>').join('');setTimeout(()=>G.candidates.forEach((_,i)=>{const b=document.getElementById('mf'+i);if(b)b.style.width=((G.candidates[i].anteil/max)*100).toFixed(1)+'%';}),200);}
const arc=document.getElementById('t-arc');setInterval(()=>{const p=Math.min((Date.now()-timerStart)/SLIDE_MS,1);if(arc)arc.setAttribute('stroke-dashoffset',(62.8*(1-p)).toFixed(2));},100);
initSlides();loadData();setInterval(loadData,REFRESH_SEC*1000);
</script>
</body>
</html>
